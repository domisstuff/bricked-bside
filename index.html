<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Download Hub</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #121212;
        color: white;
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
    }

    .card {
        background: #1e1e1e;
        border-radius: 10px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
        transition: transform 0.2s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .card img {
        width: 100%;
        height: 120px;
        object-fit: cover;
        border-radius: 8px;
    }

    .title {
        margin: 10px 0;
        font-size: 18px;
    }

    .download-btn {
        display: inline-block;
        padding: 8px 12px;
        background: #4CAF50;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }

    .download-btn:hover {
        background: #45a049;
    }
</style>
</head>

<body>

<h1>Download Hub</h1>

<div class="grid">

    <!-- ITEM START -->
    <div class="card">
        <img src="https://via.placeholder.com/300x150" alt="Preview">
        <div class="title">Example File</div>
        <a class="download-btn" href="https://example.com/file.zip" target="_blank">
            Download
        </a>
    </div>
    <!-- ITEM END -->


    <!-- COPY THIS BLOCK TO ADD MORE ↓ -->
    <div class="card">
        <img src="https://via.placeholder.com/300x150" alt="Preview">
        <div class="title">Another File</div>
        <a class="download-btn" href="https://example.com/another.zip" target="_blank">
            Download
        </a>
    </div>
    <!-- END COPY -->

</div>

</body>
</html>
