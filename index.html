<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Webcam View</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 20px;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="overlay">Click to enable webcam</div>
<video id="video" autoplay playsinline></video>

<script>
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');

  overlay.addEventListener('click', async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      overlay.style.display = 'none';
    } catch (err) {
      overlay.textContent = 'Camera access denied or unavailable.';
      console.error(err);
    }
  });
</script>

</body>
</html>
