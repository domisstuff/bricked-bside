<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Browser</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #2c2f33;
    }

    .browser {
        width: 90%;
        height: 90vh;
        margin: 20px auto;
        border-radius: 10px;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        display: flex;
        flex-direction: column;
    }

    .toolbar {
        background: #202225;
        padding: 10px;
        display: flex;
        gap: 8px;
        align-items: center;
    }

    .toolbar button {
        background: #5865f2;
        border: none;
        color: white;
        padding: 6px 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    .toolbar button:hover {
        background: #4752c4;
    }

    .toolbar input {
        flex: 1;
        padding: 6px;
        border-radius: 5px;
        border: none;
        outline: none;
    }

    iframe {
        flex: 1;
        border: none;
    }
</style>
</head>
<body>

<div class="browser">
    <div class="toolbar">
        <button onclick="goBack()">←</button>
        <button onclick="goForward()">→</button>
        <button onclick="reloadPage()">⟳</button>
        <input id="urlBar" type="text" placeholder="Enter URL..." />
        <button onclick="loadPage()">Go</button>
    </div>
    <iframe id="viewer" src="https://bricked.lol"></iframe>
</div>

<script>
    const iframe = document.getElementById("viewer");
    const urlBar = document.getElementById("urlBar");

    function formatURL(url) {
        if (!url.startsWith("http://") && !url.startsWith("https://")) {
            return "https://" + url;
        }
        return url;
    }

    function loadPage() {
        const url = formatURL(urlBar.value);
        iframe.src = url;
    }

    function goBack() {
        iframe.contentWindow.history.back();
    }

    function goForward() {
        iframe.contentWindow.history.forward();
    }

    function reloadPage() {
        iframe.contentWindow.location.reload();
    }

    // Press Enter to load
    urlBar.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            loadPage();
        }
    });
</script>

</body>
</html>
