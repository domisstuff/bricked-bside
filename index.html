<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>roblox export</title></head>
<body>
<button id="exportbtn">export</button>
<div id="status"></div>

<script>
const b=document.getElementById("exportbtn")
const s=document.getElementById("status")

b.addEventListener("click",async()=>{
  s.textContent="exporting..."
  try{
    const r=await fetch("/api/export",{method:"post"})
    const d=await r.json()
    s.textContent=`export done - total: ${d.total}`
  }catch(e){
    s.textContent="export failed"
    console.error(e)
  }
})
</script>
</body>
</html>
